<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" role="img" aria-labelledby="title desc">
  <title id="title">iOS Dynamic Island widget screenshot</title>
  <desc id="desc">An iPhone with an expanded Dynamic Island template showing workout progress and action buttons.</desc>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#d7e6f2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.22" />
    </filter>
  </defs>
  <rect width="560" height="360" rx="28" fill="#eef2f7" />
  <rect x="146" y="18" width="268" height="324" rx="38" fill="#111827" filter="url(#shadow)" />
  <rect x="156" y="28" width="248" height="304" rx="31" fill="url(#screen)" />
  <rect x="221" y="44" width="118" height="36" rx="18" fill="#05070b" />
  <circle cx="320" cy="62" r="7" fill="#111827" />
  <g filter="url(#shadow)">
    <rect x="178" y="42" width="204" height="102" rx="34" fill="#05070b" />
    <rect x="198" y="61" width="58" height="21" rx="11" fill="#101827" />
    <circle cx="213" cy="72" r="7" fill="#00d69c" />
    <text x="229" y="76" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="700">Live</text>
    <text x="198" y="103" fill="#9fb0c8" font-family="Arial, sans-serif" font-size="11">Bench Press</text>
    <text x="198" y="124" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Set 3 active</text>
    <text x="317" y="85" fill="#00d69c" font-family="Arial, sans-serif" font-size="19" font-weight="700">01:12</text>
    <rect x="301" y="104" width="52" height="24" rx="12" fill="#00d69c" />
    <text x="317" y="120" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="700">DONE</text>
  </g>
  <g opacity="0.78">
    <rect x="188" y="182" width="174" height="14" rx="7" fill="#cbd5e1" />
    <rect x="188" y="210" width="138" height="14" rx="7" fill="#cbd5e1" />
    <rect x="188" y="238" width="156" height="14" rx="7" fill="#cbd5e1" />
    <rect x="188" y="266" width="112" height="14" rx="7" fill="#cbd5e1" />
  </g>
  <rect x="232" y="317" width="96" height="5" rx="3" fill="#111827" opacity="0.46" />
  <text x="280" y="348" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Dynamic Island</text>
</svg>
