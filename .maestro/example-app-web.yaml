url: http://127.0.0.1:4173
---
- launchApp:
    clearState: true
- assertVisible: "Workout live activity reference app"
- assertVisible: "Preview Only"
- tapOn: "Start Demo Activity"
- extendedWaitUntil:
    visible:
      id: "activity-badge"
      text: "Active .*"
    timeout: 15000
- assertVisible:
    id: "activity-badge"
    text: "Active .*"
- tapOn: "Complete Set In App"
- tapOn: "Complete Set In App"
- tapOn: "Read Shared Session"
- scrollUntilVisible:
    element: "Bench Press"
    direction: DOWN
- assertVisible: "Bench Press"
- assertVisible: "Barbell"
- assertVisible: "80 kg · 8 reps"
- scrollUntilVisible:
    element: "End Activity"
    direction: UP
- tapOn: "End Activity"
- extendedWaitUntil:
    visible:
      id: "plugin-output"
      text: ".*\"ended\": true.*"
    timeout: 15000
- assertVisible:
    id: "plugin-output"
    text: ".*\"ended\": true.*"
- tapOn: "Get Plugin Version"
- extendedWaitUntil:
    visible:
      id: "plugin-output"
      text: ".*web-preview.*"
    timeout: 15000
- assertVisible:
    id: "plugin-output"
    text: ".*web-preview.*"
