<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" role="img" aria-labelledby="title desc">
  <title id="title">iOS Home Screen widget screenshot</title>
  <desc id="desc">An iPhone Home Screen with a Capgo workout widget rendered from an SVG template.</desc>
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9eef7" />
      <stop offset="0.48" stop-color="#f4d6e3" />
      <stop offset="1" stop-color="#dff5dd" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.22" />
    </filter>
  </defs>
  <rect width="560" height="360" rx="28" fill="#eef2f7" />
  <rect x="164" y="18" width="232" height="324" rx="38" fill="#111827" filter="url(#shadow)" />
  <rect x="174" y="28" width="212" height="304" rx="31" fill="url(#wallpaper)" />
  <rect x="246" y="38" width="68" height="18" rx="9" fill="#0f172a" opacity="0.9" />
  <g opacity="0.78">
    <rect x="194" y="70" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="242" y="70" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="290" y="70" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="338" y="70" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="194" y="228" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="242" y="228" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="290" y="228" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="338" y="228" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="194" y="276" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="242" y="276" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="290" y="276" width="32" height="32" rx="9" fill="#ffffff" />
    <rect x="338" y="276" width="32" height="32" rx="9" fill="#ffffff" />
  </g>
  <g filter="url(#shadow)">
    <rect x="194" y="116" width="176" height="92" rx="22" fill="#05070b" />
    <rect x="194" y="116" width="104" height="92" rx="22" fill="#00d69c" opacity="0.18" />
    <text x="214" y="142" fill="#9fb0c8" font-family="Arial, sans-serif" font-size="13">Chest Day</text>
    <text x="214" y="164" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700">Bench Press</text>
    <text x="214" y="184" fill="#7f8da3" font-family="Arial, sans-serif" font-size="12">4 x 8 at 185 lb</text>
    <text x="214" y="202" fill="#00d69c" font-family="Arial, sans-serif" font-size="15" font-weight="700">01:12 rest</text>
    <rect x="320" y="172" width="34" height="24" rx="10" fill="#00d69c" />
    <text x="331" y="189" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="700">OK</text>
  </g>
  <rect x="201" y="317" width="158" height="5" rx="3" fill="#111827" opacity="0.48" />
  <text x="280" y="348" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Home Screen / SpringBoard</text>
</svg>
