<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" role="img" aria-labelledby="title desc">
  <title id="title">Android AppWidget screenshot</title>
  <desc id="desc">An Android launcher screen with a Capgo workout AppWidget rendered from an SVG template.</desc>
  <defs>
    <linearGradient id="androidWallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d3f1e1" />
      <stop offset="0.55" stop-color="#b8d9ef" />
      <stop offset="1" stop-color="#f2e0b8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.22" />
    </filter>
  </defs>
  <rect width="560" height="360" rx="28" fill="#eef2f7" />
  <rect x="146" y="18" width="268" height="324" rx="30" fill="#1f2937" filter="url(#shadow)" />
  <rect x="156" y="28" width="248" height="304" rx="24" fill="url(#androidWallpaper)" />
  <rect x="248" y="42" width="64" height="8" rx="4" fill="#111827" opacity="0.42" />
  <text x="188" y="78" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">9:41</text>
  <g opacity="0.78">
    <rect x="184" y="238" width="34" height="34" rx="10" fill="#ffffff" />
    <rect x="236" y="238" width="34" height="34" rx="10" fill="#ffffff" />
    <rect x="288" y="238" width="34" height="34" rx="10" fill="#ffffff" />
    <rect x="340" y="238" width="34" height="34" rx="10" fill="#ffffff" />
    <rect x="184" y="288" width="190" height="24" rx="12" fill="#ffffff" opacity="0.8" />
  </g>
  <g filter="url(#shadow)">
    <rect x="184" y="106" width="190" height="96" rx="20" fill="#05070b" />
    <rect x="184" y="106" width="118" height="96" rx="20" fill="#00d69c" opacity="0.18" />
    <text x="204" y="134" fill="#9fb0c8" font-family="Arial, sans-serif" font-size="13">Workout widget</text>
    <text x="204" y="158" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Bench Press</text>
    <text x="204" y="180" fill="#7f8da3" font-family="Arial, sans-serif" font-size="12">Next: incline press</text>
    <text x="316" y="138" fill="#00d69c" font-family="Arial, sans-serif" font-size="17" font-weight="700">01:12</text>
    <rect x="316" y="158" width="38" height="28" rx="11" fill="#00d69c" />
    <text x="327" y="177" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="700">OK</text>
  </g>
  <text x="280" y="348" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="17" font-weight="700">Android AppWidget</text>
</svg>
